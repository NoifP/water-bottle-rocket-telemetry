<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 510" font-family="'Courier New', Courier, monospace">

  <!-- ── Background ── -->
  <rect width="800" height="510" fill="#10101e"/>

  <!-- ── Title ── -->
  <text x="400" y="26" text-anchor="middle" fill="#ddeeff" font-size="15" font-weight="bold">Rocket Brain — Wiring Diagram</text>
  <text x="400" y="42" text-anchor="middle" fill="#556677" font-size="9">Wemos C3 Pico · MPU-6050 · BMP388/BME280 · 9g Servo · LiPo</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  WIRES — drawn first so component boxes sit on top        -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- 3.3V power bus (red) ─── C3 → MPU VCC + BMP VCC -->
  <line x1="395" y1="175" x2="482" y2="175" stroke="#e05050" stroke-width="2.5"/>
  <line x1="482" y1="88"  x2="482" y2="243" stroke="#e05050" stroke-width="2.5"/>
  <line x1="482" y1="88"  x2="575" y2="88"  stroke="#e05050" stroke-width="2.5"/>
  <line x1="482" y1="243" x2="575" y2="243" stroke="#e05050" stroke-width="2.5"/>
  <circle cx="482" cy="88"  r="4" fill="#e05050"/>
  <circle cx="482" cy="175" r="4" fill="#e05050"/>
  <circle cx="482" cy="243" r="4" fill="#e05050"/>

  <!-- GND bus (grey) ─── C3 → MPU + BMP + Servo GND -->
  <line x1="395" y1="205" x2="492" y2="205" stroke="#888888" stroke-width="2.5"/>
  <line x1="492" y1="113" x2="492" y2="423" stroke="#888888" stroke-width="2.5"/>
  <line x1="492" y1="113" x2="575" y2="113" stroke="#888888" stroke-width="2.5"/>
  <line x1="492" y1="268" x2="575" y2="268" stroke="#888888" stroke-width="2.5"/>
  <line x1="492" y1="423" x2="575" y2="423" stroke="#888888" stroke-width="2.5"/>
  <circle cx="492" cy="113" r="4" fill="#888888"/>
  <circle cx="492" cy="205" r="4" fill="#888888"/>
  <circle cx="492" cy="268" r="4" fill="#888888"/>
  <circle cx="492" cy="423" r="4" fill="#888888"/>

  <!-- SDA bus (blue) ─── C3 → MPU SDA + BMP SDA -->
  <line x1="395" y1="235" x2="502" y2="235" stroke="#4488ff" stroke-width="2.5"/>
  <line x1="502" y1="138" x2="502" y2="293" stroke="#4488ff" stroke-width="2.5"/>
  <line x1="502" y1="138" x2="575" y2="138" stroke="#4488ff" stroke-width="2.5"/>
  <line x1="502" y1="293" x2="575" y2="293" stroke="#4488ff" stroke-width="2.5"/>
  <circle cx="502" cy="138" r="4" fill="#4488ff"/>
  <circle cx="502" cy="235" r="4" fill="#4488ff"/>
  <circle cx="502" cy="293" r="4" fill="#4488ff"/>

  <!-- SCL bus (yellow) ─── C3 → MPU SCL + BMP SCL -->
  <line x1="395" y1="265" x2="512" y2="265" stroke="#ccaa00" stroke-width="2.5"/>
  <line x1="512" y1="163" x2="512" y2="318" stroke="#ccaa00" stroke-width="2.5"/>
  <line x1="512" y1="163" x2="575" y2="163" stroke="#ccaa00" stroke-width="2.5"/>
  <line x1="512" y1="318" x2="575" y2="318" stroke="#ccaa00" stroke-width="2.5"/>
  <circle cx="512" cy="163" r="4" fill="#ccaa00"/>
  <circle cx="512" cy="265" r="4" fill="#ccaa00"/>
  <circle cx="512" cy="318" r="4" fill="#ccaa00"/>

  <!-- Servo signal / PWM (orange) ─── C3 GPIO6 → Servo Signal -->
  <path d="M 395 295 H 552 V 453 H 575" stroke="#ff8833" stroke-width="2.5" fill="none"/>

  <!-- VBUS 5V (dark red) ─── C3 VBUS → Servo VCC -->
  <path d="M 395 380 H 558 V 398 H 575" stroke="#cc2222" stroke-width="2.5" fill="none"/>

  <!-- LiPo JST to C3 Pico left side -->
  <line x1="170" y1="410" x2="220" y2="410" stroke="#ff5555" stroke-width="2.5"/>
  <line x1="170" y1="438" x2="220" y2="438" stroke="#777777" stroke-width="2.5"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  COMPONENTS                                               -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- ── Wemos C3 Pico ── -->
  <rect x="220" y="108" width="175" height="350" rx="8" fill="#1a2840" stroke="#4477bb" stroke-width="2"/>
  <text x="307" y="128" text-anchor="middle" fill="#aaccff" font-size="12" font-weight="bold">Wemos C3 Pico</text>
  <text x="307" y="142" text-anchor="middle" fill="#6688aa" font-size="9">ESP32-C3 · built-in LiPo charger</text>

  <!-- USB-C indicator at bottom -->
  <rect x="262" y="448" width="90" height="8" rx="3" fill="#1e2a3a" stroke="#445566" stroke-width="1"/>
  <text x="307" y="455" text-anchor="middle" fill="#556677" font-size="7">USB-C</text>

  <!-- Right-side pin dots + labels -->
  <circle cx="395" cy="175" r="4" fill="#e05050"/>
  <text x="388" y="179" text-anchor="end" fill="#ffaaaa" font-size="9">3.3V</text>

  <circle cx="395" cy="205" r="4" fill="#888888"/>
  <text x="388" y="209" text-anchor="end" fill="#cccccc" font-size="9">GND</text>

  <circle cx="395" cy="235" r="4" fill="#4488ff"/>
  <text x="388" y="239" text-anchor="end" fill="#aaccff" font-size="9">GPIO 4 (SDA)</text>

  <circle cx="395" cy="265" r="4" fill="#ccaa00"/>
  <text x="388" y="269" text-anchor="end" fill="#eecc77" font-size="9">GPIO 5 (SCL)</text>

  <circle cx="395" cy="295" r="4" fill="#ff8833"/>
  <text x="388" y="299" text-anchor="end" fill="#ffcc99" font-size="9">GPIO 6 (PWM)</text>

  <circle cx="395" cy="325" r="4" fill="#44bb44"/>
  <text x="388" y="329" text-anchor="end" fill="#99ff99" font-size="9">GPIO 3 (ADC) *</text>

  <circle cx="395" cy="380" r="4" fill="#cc2222"/>
  <text x="388" y="384" text-anchor="end" fill="#ff9999" font-size="9">VBUS (5V) †</text>

  <!-- Left-side JST connector pins -->
  <circle cx="220" cy="410" r="4" fill="#ff5555"/>
  <text x="228" y="414" fill="#ffaaaa" font-size="9">JST +</text>

  <circle cx="220" cy="438" r="4" fill="#777777"/>
  <text x="228" y="442" fill="#cccccc" font-size="9">JST −</text>


  <!-- ── MPU-6050 ── -->
  <rect x="575" y="55" width="205" height="130" rx="6" fill="#182a1e" stroke="#3d9955" stroke-width="2"/>
  <text x="677" y="74" text-anchor="middle" fill="#77ee99" font-size="12" font-weight="bold">MPU-6050</text>
  <text x="677" y="87" text-anchor="middle" fill="#4a8860" font-size="9">Accelerometer + Gyroscope (I2C)</text>

  <circle cx="575" cy="103" r="4" fill="#e05050"/>
  <text x="583" y="107" fill="#ffaaaa" font-size="9">VCC (3.3V)</text>

  <circle cx="575" cy="123" r="4" fill="#888888"/>
  <text x="583" y="127" fill="#cccccc" font-size="9">GND</text>

  <circle cx="575" cy="143" r="4" fill="#4488ff"/>
  <text x="583" y="147" fill="#aaccff" font-size="9">SDA</text>

  <circle cx="575" cy="163" r="4" fill="#ccaa00"/>
  <text x="583" y="167" fill="#eecc77" font-size="9">SCL</text>

  <text x="677" y="178" text-anchor="middle" fill="#336644" font-size="8">I2C address: 0x68</text>


  <!-- ── BMP388 / BME280 ── -->
  <rect x="575" y="210" width="205" height="130" rx="6" fill="#182030" stroke="#3366aa" stroke-width="2"/>
  <text x="677" y="229" text-anchor="middle" fill="#88bbff" font-size="12" font-weight="bold">BMP388 / BME280</text>
  <text x="677" y="242" text-anchor="middle" fill="#3d5c80" font-size="9">Pressure + Altitude (I2C)</text>

  <circle cx="575" cy="258" r="4" fill="#e05050"/>
  <text x="583" y="262" fill="#ffaaaa" font-size="9">VCC (3.3V)</text>

  <circle cx="575" cy="278" r="4" fill="#888888"/>
  <text x="583" y="282" fill="#cccccc" font-size="9">GND</text>

  <circle cx="575" cy="298" r="4" fill="#4488ff"/>
  <text x="583" y="302" fill="#aaccff" font-size="9">SDA</text>

  <circle cx="575" cy="318" r="4" fill="#ccaa00"/>
  <text x="583" y="322" fill="#eecc77" font-size="9">SCL</text>

  <text x="677" y="333" text-anchor="middle" fill="#2d4466" font-size="8">0x77 (BMP388) · 0x76 (BME280) · auto-detected</text>


  <!-- ── 9g Servo ── -->
  <rect x="575" y="365" width="205" height="120" rx="6" fill="#2a1e0a" stroke="#aa7722" stroke-width="2"/>
  <text x="677" y="384" text-anchor="middle" fill="#ffcc66" font-size="12" font-weight="bold">9g Servo</text>
  <text x="677" y="397" text-anchor="middle" fill="#7a5a22" font-size="9">Parachute release</text>

  <circle cx="575" cy="413" r="4" fill="#cc2222"/>
  <text x="583" y="417" fill="#ff9999" font-size="9">VCC (5V †)</text>

  <circle cx="575" cy="433" r="4" fill="#888888"/>
  <text x="583" y="437" fill="#cccccc" font-size="9">GND</text>

  <circle cx="575" cy="453" r="4" fill="#ff8833"/>
  <text x="583" y="457" fill="#ffcc99" font-size="9">Signal (PWM)</text>


  <!-- ── LiPo Battery ── -->
  <rect x="30" y="375" width="140" height="115" rx="6" fill="#1e1010" stroke="#993333" stroke-width="2"/>
  <text x="100" y="395" text-anchor="middle" fill="#ff8888" font-size="12" font-weight="bold">LiPo</text>
  <text x="100" y="408" text-anchor="middle" fill="#774444" font-size="9">3.7V battery</text>

  <circle cx="170" cy="425" r="4" fill="#ff5555"/>
  <text x="162" y="429" text-anchor="end" fill="#ffaaaa" font-size="9">(+)</text>

  <circle cx="170" cy="453" r="4" fill="#777777"/>
  <text x="162" y="457" text-anchor="end" fill="#cccccc" font-size="9">(−)</text>

  <text x="100" y="472" text-anchor="middle" fill="#664444" font-size="8">Connects via JST to C3 Pico</text>
  <text x="100" y="483" text-anchor="middle" fill="#664444" font-size="8">built-in charging circuit</text>


  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  LEGEND                                                   -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <rect x="30" y="55" width="170" height="230" rx="6" fill="#12122a" stroke="#2d3d55" stroke-width="1.5"/>
  <text x="115" y="73" text-anchor="middle" fill="#99aabb" font-size="10" font-weight="bold">Legend</text>

  <line x1="44" y1="89"  x2="84" y2="89"  stroke="#e05050" stroke-width="2.5"/>
  <text x="90" y="93" fill="#ffaaaa" font-size="9">3.3V power</text>

  <line x1="44" y1="109" x2="84" y2="109" stroke="#cc2222" stroke-width="2.5"/>
  <text x="90" y="113" fill="#ff9999" font-size="9">5V / VBUS</text>

  <line x1="44" y1="129" x2="84" y2="129" stroke="#888888" stroke-width="2.5"/>
  <text x="90" y="133" fill="#cccccc" font-size="9">GND</text>

  <line x1="44" y1="149" x2="84" y2="149" stroke="#4488ff" stroke-width="2.5"/>
  <text x="90" y="153" fill="#aaccff" font-size="9">SDA (I2C data)</text>

  <line x1="44" y1="169" x2="84" y2="169" stroke="#ccaa00" stroke-width="2.5"/>
  <text x="90" y="173" fill="#eecc77" font-size="9">SCL (I2C clock)</text>

  <line x1="44" y1="189" x2="84" y2="189" stroke="#ff8833" stroke-width="2.5"/>
  <text x="90" y="193" fill="#ffcc99" font-size="9">PWM signal</text>

  <line x1="44" y1="209" x2="84" y2="209" stroke="#ff5555" stroke-width="2.5"/>
  <text x="90" y="213" fill="#ffaaaa" font-size="9">LiPo JST (+)</text>

  <circle cx="64" cy="229" r="4" fill="#aaaaaa"/>
  <text x="90" y="233" fill="#dddddd" font-size="9">Wire junction</text>

  <line x1="44" y1="253" x2="74" y2="253" stroke="#556677" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="90" y="257" fill="#556677" font-size="9">Optional</text>

  <text x="115" y="278" text-anchor="middle" fill="#44556677" font-size="8">SDA + SCL shared by</text>
  <text x="115" y="288" text-anchor="middle" fill="#44556677" font-size="8" opacity="0.6">MPU-6050 and BMP388</text>

  <!-- ── Battery ADC callout ── -->
  <rect x="30" y="290" width="170" height="72" rx="5" fill="#12122a" stroke="#336633" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="115" y="305" text-anchor="middle" fill="#77cc77" font-size="9" font-weight="bold">* Battery monitoring (optional)</text>
  <text x="115" y="320" text-anchor="middle" fill="#446644" font-size="8">GPIO 3 ← [R1 10kΩ] ← LiPo (+)</text>
  <text x="115" y="333" text-anchor="middle" fill="#446644" font-size="8">            ↓ [R2 10kΩ] ↓ GND</text>
  <text x="115" y="346" text-anchor="middle" fill="#336633" font-size="8">ratio 2:1 matches BATTERY_DIVIDER_RATIO</text>

  <!-- ── VBUS note ── -->
  <text x="400" y="498" text-anchor="middle" fill="#554444" font-size="8">† VBUS 5V is present only when USB-C is connected. For battery-only flight, use a servo rated for 3.3–4.2V or add a 5V boost converter.</text>

</svg>
